name: Update Country Data

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Sync supported locale
        run: php scripts/sync-supported-locale.php

      - name: Fetch countries
        run: php scripts/fetch-countries.php

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain data/ src/SupportedLocale.php 2>/dev/null)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ src/SupportedLocale.php
          git commit -m "chore: sync country data and SupportedLocale enum"
          git push
